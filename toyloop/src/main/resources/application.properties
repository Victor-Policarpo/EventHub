spring.application.name=ToyLoop Rental System
jwt.public.key=classpath:app.pub
jwt.private.key=classpath:app.key
app.tokenJwtExpirationMs=${DURATION_TOKEN_JWT:900000}
app.jwtRefreshExpirationMs=${DURATION_REFRESH_TOKEN:604800000}
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.web.error.include-stacktrace=never
spring.data.web.pageable.serialization-mode=via-dto
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.frontend.url=${FRONTEND_URL}
app.frontend.url.resetpassword=${URL_RESET_PASSWORD}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.model-and-view-allowed=true